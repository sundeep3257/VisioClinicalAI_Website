{% extends "base.html" %}

{% block content %}
<section class="page-hero page-hero--compact">
  <div class="page-hero__bg"></div>
  <div class="container page-hero__inner reveal">
    <h1 class="page-hero__title">Contact VisioClinical AI</h1>
  </div>
</section>

<section class="section section--light">
  <div class="container container--narrow contact-page">
    <p class="contact-page__headline reveal">Partner with us on the future of virtual physical assessment</p>
    <div class="contact-cards contact-cards--centered reveal">
      <article class="contact-card glass-card">
        <div class="contact-card__icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><path d="M22 6l-10 7L2 6"/></svg>
        </div>
        <h2>Email</h2>
        <p><a href="mailto:{{ site.email }}">{{ site.email }}</a></p>
      </article>
      <article class="contact-card glass-card">
        <div class="contact-card__icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
        </div>
        <h2>Mailing Address</h2>
        <p>{{ site.address }}</p>
      </article>
    </div>
  </div>
</section>
{% endblock %}
